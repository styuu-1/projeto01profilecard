<!DOCTYPE html>
<html lang="pt-br">

<head>


    <!-- Titulo -->
    <title>Card pessoal interativo</title>
    <!-- Titulo -->

    <!-- Meta arquivos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="card, blog pessoal, informação">
    <meta name="description" content="meu card pessoal feito especialmente para projeto, 01 projeto">
    <meta name="author" content="Samuel Pacheco Falcão Rodrigues">
    <meta name="robots" content="index, follow">
    <!-- Meta arquivos -->

    <!-- Link css -->
    <link rel="stylesheet" href="css/styletotal.css">
    <!-- Link css -->

    <!-- boxicons css -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- boxicons css -->

</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="img/imagemwhatsapp.jpeg"
                alt="Retrato frontal de um homem jovem de pele parda, usando óculos de armação preta e camiseta branca, contra um fundo de parede clara."
                class="imagem-pessoal">
        </div>

        <div class="text-data">
            <span class="name">Samuel Pacheco Falcão Rodrigues</span>
            <span class="job">Proano | C# Html Css .Net</span>
        </div>

        <div class="media-buttons">

            <a href="#" style="background: #993399" class="link">
                <i class='bx bxl-instagram-alt'></i>
            </a>
            <a href="#" style="background: #008000 " class="link">
                <i class='bx bxl-whatsapp'></i>
            </a>
            <a href="#" style="background: #00a8ff " class="link">
                <i class='bx bxl-linkedin-square'></i>
            </a>


        </div>

        <div class="buttons">
            <button class="button"> Me siga nas redes sociais</button>
            <button class="button"> Me Chame No Whatsapp</button>

        </div>


        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">
                    3
                </span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded-dots'></i>
                <span class="number">
                    0
                </span>
            </div>
            <div class="data">
                <i class='bx bx-share-alt'></i>
                <span class="number">
                    5
                </span>




            </div>


        </div>


</body>

</html>
